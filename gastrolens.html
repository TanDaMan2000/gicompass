<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=https://gastrocompass.org/gastrolens/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to GastroLens</title>
    <meta
      name="description"
      content="Redirecting to the live GastroLens assessment tool."
    />
    <link rel="canonical" href="https://gastrocompass.org/gastrolens/" />
    <style>
      body {
        margin: 0;
        font-family: Manrope, system-ui, sans-serif;
        background: linear-gradient(180deg, #f4fbfd 0%, #edf6f8 100%);
        color: #16354a;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        max-width: 640px;
        border: 1px solid rgba(22, 53, 74, 0.12);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(21, 53, 74, 0.08);
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.75;
        color: rgba(22, 53, 74, 0.76);
      }

      a {
        color: #0f7994;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Redirecting to GastroLens</h1>
        <p>
          If you are not redirected automatically, open
          <a href="https://gastrocompass.org/gastrolens/">the live GastroLens app</a>.
        </p>
      </section>
    </main>
  </body>
</html>
